<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1a1a2e"/>
<link rel="apple-touch-icon" href="logo.png">
<link rel="icon" type="image/png" href="logo.png">
<title>Mama Fund</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #22223b;
    --border: rgba(255,255,255,0.08); --text: #f0ede8;
    --muted: rgba(240,237,232,0.45); --income: #6ee7b7;
    --expense: #fca5a5; --mother: #c4b5fd; --accent: #f59e0b;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  html { height: -webkit-fill-available; }
  body { height: 100%; height: 100dvh; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
  #root { height: 100%; height: 100dvh; min-height: -webkit-fill-available; display: flex; flex-direction: column; }

  /* ── Auth ── */
  .auth-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(196,181,253,0.12) 0%, transparent 70%); }
  .auth-logo { font-family: 'DM Serif Display', serif; font-size: 3rem; color: var(--text); margin-bottom: 24px; }
  .auth-logo span { color: var(--mother); font-style: italic; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px 24px; width: 100%; max-width: 360px; text-align: center; }
  .auth-card p { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }

  /* ── Layout ── */
  .app { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { padding: calc(var(--safe-top) + 12px) 20px 12px; display: flex; align-items: center; justify-content: space-between; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .topbar-title { font-family: 'DM Serif Display', serif; font-size: 1.3rem; display: flex; align-items: center; gap: 8px; }
  .topbar-title span { color: var(--mother); font-style: italic; }
  .topbar-user { font-size: 0.75rem; color: var(--muted); text-align: right; }
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 0 calc(env(safe-area-inset-bottom, 0px) + 80px); min-height: 0; }

  /* ── Bottom nav ── */
  .bottom-nav { position: fixed; bottom: env(safe-area-inset-bottom, 0px); left: 0; right: 0; padding: 10px 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: var(--muted); font-size: 0.6rem; cursor: pointer; padding: 4px; transition: color .2s; }
  .nav-btn.active { color: var(--mother); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* ── Forms ── */
  .form-screen { padding: 16px 16px 0; overflow-x: hidden; }
  .form-screen h2 { font-family: 'DM Serif Display', serif; font-size: 1.35rem; margin-bottom: 14px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 0.73rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; display: block; }
  .form-control { width: 100%; max-width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--text); font-family: inherit; font-size: 0.92rem; -webkit-appearance: none; appearance: none; }
  .form-control:focus { outline: none; border-color: var(--mother); }
  select.form-control option { background: var(--surface2); }
  .btn-primary { width: 100%; background: var(--mother); color: #1a1a2e; border: none; border-radius: 12px; padding: 15px; font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Segmented control ── */
  .seg { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; margin-bottom: 16px; gap: 2px; }
  .seg-btn { flex: 1; padding: 8px 4px; text-align: center; border-radius: 8px; font-size: 0.75rem; cursor: pointer; color: var(--muted); border: none; background: none; font-family: inherit; transition: all .2s; line-height: 1.3; }
  .seg-btn.active { background: var(--mother); color: #1a1a2e; font-weight: 600; }

  /* ── Mini balance strip ── */
  .mini-balance { display: flex; gap: 8px; margin-bottom: 16px; }
  .mini-bal-chip { flex: 1; text-align: center; padding: 10px 6px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); }
  .mini-bal-name { font-size: 0.65rem; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .06em; }
  .mini-bal-val { font-family: 'DM Serif Display', serif; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 3px; }
  .mini-bal-val.pos { color: var(--income); }
  .mini-bal-val.neg { color: var(--expense); }
  .mini-bal-val.zero { color: var(--muted); }
  .mini-bal-chip.mine { background: rgba(196,181,253,0.08); border-color: rgba(196,181,253,0.4); box-shadow: 0 0 0 1px rgba(196,181,253,0.2); }

  /* ── Transaction list ── */
  .tx-list { padding: 0 16px; }
  .tx-day { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; padding: 14px 0 6px; }
  .tx-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .tx-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
  .tx-icon.expense        { background: rgba(252,165,165,.12); }
  .tx-icon.mother_expense { background: rgba(252,165,165,.08); }
  .tx-icon.income         { background: rgba(110,231,183,.12); }
  .tx-icon.transfer       { background: rgba(196,181,253,.12); }
  .tx-body { flex: 1; min-width: 0; }
  .tx-desc { font-size: 0.88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .tx-amount { font-family: 'DM Serif Display', serif; font-size: 1.05rem; flex-shrink: 0; }
  .tx-amount.expense        { color: var(--expense); }
  .tx-amount.mother_expense { color: var(--expense); }
  .tx-amount.income         { color: var(--income); }
  .tx-amount.transfer       { color: var(--mother); }
  .tx-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  .tx-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 6px; font-size: 1rem; border-radius: 6px; transition: color .15s; }
  .tx-btn:hover { color: var(--text); }
  .tx-btn.disabled { opacity: 0.2; cursor: not-allowed; pointer-events: none; }
  /* edited badge */
  .tx-edited { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-left: 4px; vertical-align: middle; flex-shrink: 0; }

  /* ── Summary / Resumen ── */
  .section { padding: 16px 16px 0; }
  .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 10px; }
  .month-selector { display: flex; align-items: center; gap: 12px; padding: 14px 16px 0; }
  .month-selector select { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 10px; font-family: inherit; font-size: 0.85rem; flex: 1; }
  .month-selector select:focus { outline: none; border-color: var(--mother); }
  .cards-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .card.wide { grid-column: span 2; }
  .card-label { font-size: 0.68rem; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .08em; }
  .card-value { font-family: 'DM Serif Display', serif; font-size: 1.5rem; line-height: 1; }
  .card-value.income  { color: var(--income); }
  .card-value.expense { color: var(--expense); }
  .card-value.mother  { color: var(--mother); }

  /* Sibling balance rows */
  .sibling-balances { display: flex; flex-direction: column; gap: 8px; }
  .sib-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--surface2); border-radius: 10px; }
  .sib-name { font-size: 0.85rem; font-weight: 500; }
  .sib-detail { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .sib-balance { font-family: 'DM Serif Display', serif; font-size: 1.1rem; }
  .sib-balance.pos { color: var(--income); }
  .sib-balance.neg { color: var(--expense); }

  /* Category bars */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-label { font-size: 0.8rem; color: var(--muted); width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }
  .bar-amount { font-size: 0.78rem; color: var(--text); width: 80px; text-align: right; flex-shrink: 0; }

  /* Donut chart area */
  .chart-wrap { display: flex; align-items: center; gap: 16px; padding: 8px 0; }
  .chart-legend { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ── Activity log modal ── */
  .log-entry { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .log-action { font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 99px; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }
  .log-action.create { background: rgba(110,231,183,.15); color: var(--income); }
  .log-action.edit   { background: rgba(245,158,11,.15);  color: var(--accent); }
  .log-action.delete { background: rgba(252,165,165,.15); color: var(--expense); }
  .log-body { flex: 1; min-width: 0; }
  .log-who  { font-size: 0.8rem; font-weight: 500; }
  .log-when { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; }
  .log-diff { font-size: 0.75rem; color: var(--muted); }
  .log-diff span { color: var(--text); }

  .toast { position: fixed; top: calc(var(--safe-top) + 16px); left: 50%; transform: translateX(-50%); background: var(--income); color: #0f1a0f; padding: 10px 20px; border-radius: 99px; font-size: 0.85rem; font-weight: 600; z-index: 999; pointer-events: none; opacity: 0; transition: opacity .3s; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--expense); color: #1a0f0f; }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(196,181,253,.3); border-top-color: var(--mother); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.88rem; }
  #ai-text:focus { outline: none; border-color: var(--mother); }
  .filter-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 5px 12px; font-size: 0.75rem; color: var(--muted); cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; }
  .filter-chip.active { background: var(--mother); color: #1a1a2e; border-color: var(--mother); font-weight: 600; }
  input[type="date"].date-input { color: var(--text); -webkit-appearance: none; appearance: none; }
  input[type="date"].date-input::-webkit-date-and-time-value { text-align: left; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module">

// ════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════
const CONFIG = {
  APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbxT0O32r7miv08TyBgi3cA71s6Wbr9-UmanR990hWU0KLTiNElh1YlXs5iUDjBN-40sEQ/exec",
  GOOGLE_CLIENT_ID: "434284641729-ujfijla3m0f0n59bhanfec9vmcc5nd7a.apps.googleusercontent.com",
  ADMIN_EMAILS: ["admin@fucer.org", "coroleu@gmail.com"],
  SIBLINGS: ["Fede", "Mery", "Vero"],
  INCOME_SOURCES: ["Jubilación", "Alquiler", "Aporte Fede", "Aporte Vero", "Aporte Mery", "Otros"],
  CATEGORIES: ["🛒 Supermercado", "💡 Servicios", "🍽️ Salidas", "🏥 Médico", "💰 Otros"],
  PAYMENT_METHODS: ["Cuenta", "Tarjeta", "Débito"],
  CAT_COLORS: ["#6ee7b7","#c4b5fd","#fca5a5","#fde68a","#93c5fd"],
  EMAIL_TO_SIBLING: {
    "admin@fucer.org": "Fede",
    "coroleu@gmail.com": "Fede",
    "mery@fucer.org": "Mery",
    "verocoroleu@fucer.org": "Vero",
  },
};

function today() {
  const d = new Date();
  const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
  return local.toISOString().slice(0,10);
}
function catShort(c) { return c.replace(/^[^\s]+\s/,""); }

// ── State ──────────────────────────────────────────────────
let state = {
  user: null, idToken: null,
  tab: "gastos",
  transactions: [],
  loading: false,
  selectedMonth: new Date().toISOString().slice(0,7),
  historialFilter: "all",
  categoryFilter: "all",
  sibFilter: "all",
  resumenFilter: new Date().toISOString().slice(0,7),
  expForm: {
    subtype: "expense",
    amount: "", description: "", category: CONFIG.CATEGORIES[0],
    paidBy: "", paymentMethod: "Cuenta", date: today(),
  },
  aiText: "",
  showTutorial: false,
  aiLoading: false,
  aiResult: null,
  incForm: {
    subtype: "transfer",
    amount: "", description: "",
    source: "Jubilación",
    from: "Mamá",
    recipient: "",
    date: today(),
  },
};

function setState(patch) { Object.assign(state, patch); render(); }

// ── Helpers ────────────────────────────────────────────────
function isAdmin() {
  return CONFIG.ADMIN_EMAILS.includes(state.user?.email || "");
}

function canEditTx(tx) {
  if (!state.user) return false;
  if (isAdmin()) return true;
  return tx.loggedByEmail === state.user.email;
}

// ── API ────────────────────────────────────────────────────
function handleApiResponse(d) {
  if (!d.ok) {
    if (d.code === 401) {
      window.google?.accounts?.id?.disableAutoSelect();
      setState({ user: null, idToken: null, transactions: [] });
      throw new Error("Sesión expirada. Volvé a iniciar sesión.");
    }
    throw new Error(d.error);
  }
  return d.data;
}

async function apiGet(action, params={}) {
  const q = new URLSearchParams({ action, token: state.idToken, ...params });
  const r = await fetch(`${CONFIG.APPS_SCRIPT_URL}?${q}`, { redirect: "follow" });
  return handleApiResponse(await r.json());
}

async function apiPost(action, params={}) {
  const body = new URLSearchParams({ action, token: state.idToken, ...params });
  const r = await fetch(CONFIG.APPS_SCRIPT_URL, {
    method: "POST", redirect: "follow", body,
  });
  return handleApiResponse(await r.json());
}

async function loadTransactions() {
  if (!state.user) return;
  setState({ loading: true });
  try {
    const data = await apiGet("transactions");
    const sorted = data.sort((a,b) => {
      const da = (a.date || a.timestamp || "").slice(0,10);
      const db = (b.date || b.timestamp || "").slice(0,10);
      return db.localeCompare(da);
    });
    setState({ transactions: sorted, loading: false });
  } catch(e) {
    showToast("Error cargando datos", true);
    setState({ loading: false });
  }
}

// ── AI parser ──────────────────────────────────────────────
async function parseWithGemini(text) {
  setState({ aiLoading: true, aiResult: null });
  try {
    const parsed = await apiGet("parseWithAI", { text: encodeURIComponent(text) });

    if (parsed.type === "expense" || parsed.type === "mother_expense") {
      const cat = CONFIG.CATEGORIES.find(c => c.toLowerCase().includes((parsed.category||"").toLowerCase())) || CONFIG.CATEGORIES[0];
      setState({
        aiLoading: false, aiResult: parsed, tab: "gastos",
        expForm: { ...state.expForm, subtype: parsed.type, amount: parsed.amount ? String(parsed.amount) : "",
          description: parsed.description || "", category: cat, paidBy: parsed.paidBy || state.expForm.paidBy,
          paymentMethod: parsed.paymentMethod || "Cuenta", date: parsed.date || today() }
      });
    } else {
      setState({
        aiLoading: false, aiResult: parsed, tab: "ingresos",
        incForm: { ...state.incForm, subtype: parsed.type || "transfer", amount: parsed.amount ? String(parsed.amount) : "",
          description: parsed.description || "", source: parsed.source || state.incForm.source,
          recipient: parsed.recipient || "", from: parsed.type === "transfer" ? "Mamá" : state.incForm.from,
          date: parsed.date || today() }
      });
    }
  } catch(e) {
    setState({ aiLoading: false, aiResult: { interpretation: "No pude entender el texto. Completá el formulario manualmente.", confidence: "low" } });
  }
}

// ── Submit expense ─────────────────────────────────────────
async function submitExpense() {
  const f = state.expForm;
  if (!f.amount || isNaN(parseFloat(f.amount))) { showToast("Ingresá un monto válido", true); return; }
  if (f.subtype === "expense" && !f.paidBy) { showToast("Seleccioná quién pagó", true); return; }
  const amt = parseFloat(f.amount);
  const dup = state.transactions.find(t =>
    parseFloat(t.amount) === amt &&
    (t.date || t.timestamp || "").slice(0,10) === f.date &&
    t.type === f.subtype
  );
  if (dup) {
    const ok = await showConfirm("¿Posible duplicado?",
      `Ya existe un ${f.subtype === "expense" ? "gasto" : "gasto de mamá"} de ${fmt(amt)} el ${fmtDateDisplay(f.date)}. ¿Guardás igual?`,
      "Guardar igual");
    if (!ok) return;
  }
  setState({ loading: true });
  try {
    await apiGet("addTransaction", {
      type: f.subtype, amount: parseFloat(f.amount),
      description: f.description || catShort(f.category),
      category: catShort(f.category),
      paidBy: f.subtype === "expense" ? f.paidBy : "",
      paymentMethod: f.subtype === "mother_expense" ? f.paymentMethod : "",
      recipient: "", date: f.date, source: "manual",
    });
    const defaultPaidBy = matchSibling(state.user?.firstName);
    setState({ loading: false, aiText: "", aiLoading: false, aiResult: null,
      expForm: { ...f, amount: "", description: "", paidBy: defaultPaidBy, date: today() } });
    loadTransactions();
    setTimeout(() => showToast("✓ Gasto guardado"), 50);
  } catch(e) { setState({ loading: false }); showToast("Error al guardar: " + e.message, true); }
}

// ── Submit income / transfer ───────────────────────────────
async function submitIncome() {
  const f = state.incForm;
  if (!f.amount || isNaN(parseFloat(f.amount))) { showToast("Ingresá un monto válido", true); return; }
  if (f.subtype === "transfer" && !f.recipient) { showToast("Seleccioná el destinatario", true); return; }
  setState({ loading: true });
  try {
    const desc = f.description ||
      (f.subtype === "transfer" ? `Transferencia de ${f.from} a ${f.recipient}` : f.source);
    await apiGet("addTransaction", {
      type: f.subtype, amount: parseFloat(f.amount), description: desc, category: "",
      paidBy: f.subtype === "transfer" ? f.from : "",
      recipient: f.subtype === "transfer" ? f.recipient : "",
      source_type: f.source || "", date: f.date, source: "manual",
    });
    setState({ loading: false, aiText: "", aiLoading: false, aiResult: null,
      incForm: { ...f, amount: "", description: "", date: today() } });
    loadTransactions();
    setTimeout(() => showToast("✓ Registrado"), 50);
  } catch(e) { setState({ loading: false }); showToast("Error al guardar: " + e.message, true); }
}

// ── Delete ─────────────────────────────────────────────────
async function deleteTransaction(id) {
  const tx = state.transactions.find(t => t.id === id);
  if (!tx) return;
  if (!canEditTx(tx)) { showToast("No tenés permiso para eliminar esta transacción", true); return; }
  const confirmed = await showConfirm("¿Eliminar esta transacción?", "Esta acción no se puede deshacer.", "Eliminar");
  if (!confirmed) return;
  try {
    await apiGet("deleteTransaction", { id });
    await loadTransactions();
    setTimeout(() => showToast("✓ Eliminado"), 50);
  } catch(e) { showToast("Error al eliminar: " + e.message, true); }
}

// ── Edit — now uses updateTransaction ──────────────────────
function editTransaction(id) {
  const tx = state.transactions.find(t => t.id === id);
  if (!tx) return;
  if (!canEditTx(tx)) { showToast("No tenés permiso para editar esta transacción", true); return; }

  const overlay = document.createElement("div");
  overlay.id = "edit-overlay";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(15,15,26,0.9);z-index:9999;display:flex;align-items:flex-end;justify-content:center;";

  const sheet = document.createElement("div");
  sheet.style.cssText = "background:var(--surface);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;";

  // Header
  const header = document.createElement("div");
  header.style.cssText = "font-family:'DM Serif Display',serif;font-size:1.1rem;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;";
  const headerText = document.createElement("span");

// ── Activity log modal ─────────────────────────────────────
async function showActivityLog(txId) {
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(15,15,26,0.9);z-index:9999;display:flex;align-items:flex-end;justify-content:center;";

  const sheet = document.createElement("div");
  sheet.style.cssText = "background:var(--surface);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:500px;max-height:75vh;overflow-y:auto;";

  const header = document.createElement("div");
  header.style.cssText = "font-family:'DM Serif Display',serif;font-size:1.1rem;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;";
  const headerText = document.createElement("span");
  headerText.textContent = "🕐 Historial de cambios";
  const closeBtn = document.createElement("button");
  closeBtn.textContent = "×";
  closeBtn.style.cssText = "background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;";
  closeBtn.onclick = () => overlay.remove();
  header.appendChild(headerText);
  header.appendChild(closeBtn);
  sheet.appendChild(header);

  const loadingEl = document.createElement("div");
  loadingEl.className = "empty";
  loadingEl.innerHTML = '<div class="spinner"></div>';
  sheet.appendChild(loadingEl);

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e => { if(e.target === overlay) overlay.remove(); });

  try {
    const entries = await apiGet("activityLog", { txId });
    sheet.removeChild(loadingEl);

    if (!entries.length) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "Sin historial registrado";
      sheet.appendChild(empty);
      return;
    }

    entries.forEach(entry => {
      const row = document.createElement("div");
      row.className = "log-entry";

      const badge = document.createElement("div");
      badge.className = "log-action " + (entry.action || "");
      badge.textContent = entry.action === "create" ? "Creó" : entry.action === "edit" ? "Editó" : "Eliminó";
      row.appendChild(badge);

      const body = document.createElement("div");
      body.className = "log-body";

      const who = document.createElement("div");
      who.className = "log-who";
      who.textContent = entry.actorName || entry.actorEmail || "?";
      body.appendChild(who);

      const when = document.createElement("div");
      when.className = "log-when";
      when.textContent = fmtTimestamp(entry.timestamp);
      body.appendChild(when);

      // Show diff for edits
      if (entry.action === "edit" && entry.before && entry.after) {
        try {
          const before = typeof entry.before === "string" ? JSON.parse(entry.before) : entry.before;
          const after  = typeof entry.after  === "string" ? JSON.parse(entry.after)  : entry.after;
          const diffs  = [];
          const fields = { amount:"Monto", description:"Descripción", date:"Fecha", category:"Categoría", paidBy:"Pagado por" };
          Object.entries(fields).forEach(([k, label]) => {
            const bv = String(before[k] || "");
            const av = String(after[k]  || "");
            if (bv !== av) diffs.push({ label, from: bv, to: av });
          });
          if (diffs.length) {
            const diffEl = document.createElement("div");
            diffEl.className = "log-diff";
            diffs.forEach(d => {
              const line = document.createElement("div");
              line.style.marginTop = "2px";
              const label = document.createElement("span");
              label.textContent = d.label + ": ";
              const from = document.createElement("span");
              from.style.textDecoration = "line-through";
              from.style.color = "var(--expense)";
              from.textContent = d.label === "amount" ? fmt(parseFloat(d.from)||0) : d.from;
              const arrow = document.createTextNode(" → ");
              const to = document.createElement("span");
              to.style.color = "var(--income)";
              to.textContent = d.label === "amount" ? fmt(parseFloat(d.to)||0) : d.to;
              line.appendChild(label);
              line.appendChild(from);
              line.appendChild(arrow);
              line.appendChild(to);
              diffEl.appendChild(line);
            });
            body.appendChild(diffEl);
          }
        } catch(_) {}
      }

      row.appendChild(body);
      sheet.appendChild(row);
    });
  } catch(e) {
    sheet.removeChild(loadingEl);
    const errEl = document.createElement("div");
    errEl.className = "empty";
    errEl.textContent = "Error cargando historial";
    sheet.appendChild(errEl);
  }
}

function fmtTimestamp(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  return d.toLocaleDateString("es-AR", { day:"numeric", month:"short", year:"numeric" }) + " " +
         d.toLocaleTimeString("es-AR", { hour:"2-digit", minute:"2-digit" });
}

// ── Computed balances ──────────────────────────────────────
function computeBalances(txs) {
  txs = txs || state.transactions;
  const sib = {};
  CONFIG.SIBLINGS.forEach(s => sib[s] = { received: 0, spent: 0, aportes: 0 });
  let mamaIngresos = 0, mamaGastos = 0, totalIngresos = 0, totalGastos = 0, totalTransfers = 0;

  txs.forEach(t => {
    const amt = parseFloat(t.amount || 0);
    if (t.type === "income") {
      totalIngresos += amt;
      if (t.recipient && sib[t.recipient] !== undefined) sib[t.recipient].received += amt;
      else mamaIngresos += amt;
      if ((t.source_type || t.description || "").startsWith("Aporte")) {
        const src = t.source_type || "";
        CONFIG.SIBLINGS.forEach(s => { if (src.includes(s) && sib[s]) sib[s].aportes += amt; });
      }
    }
    if (t.type === "transfer") {
      totalTransfers += amt;
      if (t.recipient && sib[t.recipient] !== undefined) sib[t.recipient].received += amt;
    }
    if (t.type === "expense") {
      totalGastos += amt;
      if (t.paidBy && sib[t.paidBy] !== undefined) sib[t.paidBy].spent += amt;
    }
    if (t.type === "mother_expense") { totalGastos += amt; mamaGastos += amt; }
  });

  return {
    sib, mamaIngresos, mamaGastos,
    mamaBalance: mamaIngresos - mamaGastos - totalTransfers,
    totalIngresos, totalGastos,
    systemBalance: totalIngresos - totalGastos,
    totalTransfers,
  };
}

function sortedBalances(txs) {
  const { sib } = computeBalances(txs);
  return CONFIG.SIBLINGS
    .map(s => ({ name: s, received: sib[s].received, spent: sib[s].spent, aportes: sib[s].aportes, net: sib[s].received - sib[s].spent }))
    .sort((a,b) => b.net - a.net);
}

function initGoogleSignIn() {
  window.google.accounts.id.initialize({
    client_id: CONFIG.GOOGLE_CLIENT_ID,
    callback: (response) => {
      const payload = parseJwt(response.credential);
      const matched = CONFIG.EMAIL_TO_SIBLING[payload.email] || matchSibling(payload.name?.split(" ")[0] || "");
      setState({
        user: { name: payload.name, firstName: matched, email: payload.email },
        idToken: response.credential,
        expForm: { ...state.expForm, paidBy: matched },
      });
      loadTransactions();
      if (!localStorage.getItem("mf_tutorial_seen")) setTimeout(() => setState({ showTutorial: true }), 1000);
    },
    auto_select: true,
  });
  window.google.accounts.id.renderButton(document.getElementById("g-signin-btn"), {
    theme: "filled_black", size: "large", shape: "pill", text: "signin_with",
  });
  window.google.accounts.id.prompt();
}

function matchSibling(firstName) {
  return CONFIG.SIBLINGS.find(s => s.toLowerCase() === (firstName||"").toLowerCase()) || CONFIG.SIBLINGS[0];
}
function parseJwt(token) {
  return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
}

let toastTimer;
function showToast(msg, isError=false) {
  const el = document.getElementById("toast");
  if (!el) return;
  el.textContent = msg;
  el.className = "toast show" + (isError?" error":"");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = "toast"; }, 8000);
}

// ── Formatters ─────────────────────────────────────────────
function filterTxs(txs, filter) {
  if (!filter || filter === "all") return txs;
  const thisYear = new Date().getFullYear().toString();
  return txs.filter(t => {
    const d = (t.date || t.timestamp || "").slice(0,10);
    if (filter === "ytd") return d.slice(0,4) === thisYear && d <= today();
    if (filter.length === 4) return d.slice(0,4) === filter;
    return d.slice(0,7) === filter;
  });
}

function getYears() {
  const years = new Set(state.transactions.map(t => (t.date||t.timestamp||"").slice(0,4)).filter(Boolean));
  return [...years].sort((a,b)=>b.localeCompare(a));
}

  '"Mery pagó 15000 en el super ayer"',
  '"Mamá transfirió 500 lucas a Vero"',
  '"ABL con la cuenta de mamá, 42000"',
  '"Celu de mamá, 22000 con tarjeta"',

function txIcon(t) {
  if (t.type === "expense") {
    const cat = t.category || "";
    if (cat.includes("Supermercado")) return "🛒";
    if (cat.includes("Servicios"))    return "💡";
    if (cat.includes("Salidas"))      return "🍽️";
    if (cat.includes("Médico"))       return "🏥";
    return "📦";
  }
  if (t.type === "mother_expense") return (t.paymentMethod||"").toLowerCase() === "tarjeta" ? "💳" : "🏦";
  if (t.type === "transfer") return "📤";
  if (t.type === "income") {
    const src = (t.source_type || t.description || "").toLowerCase();
    if (src.includes("jubilaci")) return "💵";
    if (src.includes("alquiler")) return "🏠";
    if (src.includes("aporte"))   return "🤝";
    return "💶";
  }
  return "💰";
}

const fmt = n => new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n);
const typeLabel = { income:"Ingreso", expense:"Gasto", transfer:"Transferencia", mother_expense:"Gasto mamá" };

function formatDay(iso) {
  return new Date(iso+"T12:00:00").toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}
function fmtDateDisplay(iso) {
  if (!iso) return "";
  return new Date(iso+"T12:00:00").toLocaleDateString("es-AR",{day:"numeric",month:"short",year:"numeric"});
}
function getLast12Months() {
  const months=[], d=new Date();
  for(let i=0;i<12;i++) months.push(new Date(d.getFullYear(),d.getMonth()-i,1).toISOString().slice(0,7));
  return months;
}
function formatMonth(m) {
  const [y,mo]=m.split("-");
  return new Date(parseInt(y),parseInt(mo)-1).toLocaleDateString("es-AR",{month:"long",year:"numeric"});
}

function renderFilterBar(filterKey, onChange, showCategory=false, showSib=false) {
  const f = state[filterKey];
  const years = getYears();
  const months = getLast12Months();
  const periodOptions = [
    { val:"all", label:"Todo" },
    { val:"ytd", label:"YTD" },
    ...years.map(y=>({ val:y, label:y })),
    ...months.map(m=>({ val:m, label:formatMonth(m) })),
  ];
  return `
    <div style="padding:12px 16px 0;display:flex;gap:8px;flex-wrap:wrap;">
      <select onchange="${onChange}(this.value)" style="flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:0.82rem;">
        ${periodOptions.map(o=>`<option value="${o.val}" ${f===o.val?"selected":""}>${f===o.val?"📅 ":""}${o.label}</option>`).join("")}
      </select>
      ${showCategory ? `
      <select onchange="setCategoryFilter(this.value)" style="flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:0.82rem;">
        <option value="all" ${state.categoryFilter==="all"?"selected":""}>🏷️ Categoría</option>
        ${CONFIG.CATEGORIES.map(c=>`<option value="${c.replace(/^[^\s]+\s/,"")}" ${state.categoryFilter===c.replace(/^[^\s]+\s/,"")?"selected":""}>${c}</option>`).join("")}
      </select>` : ""}
      ${showSib ? `
      <select onchange="setSibFilter(this.value)" style="flex:1;min-width:100px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:0.82rem;">
        <option value="all" ${state.sibFilter==="all"?"selected":""}>👤 Persona</option>
        <option value="Mamá" ${state.sibFilter==="Mamá"?"selected":""}>Mamá</option>
        ${CONFIG.SIBLINGS.map(s=>`<option value="${s}" ${state.sibFilter===s?"selected":""}>${s}</option>`).join("")}
      </select>` : ""}
    </div>`;
}

function renderMovimientos() {
  let txs = filterTxs(state.transactions, state.historialFilter);
  if (state.categoryFilter !== "all") txs = txs.filter(t => (t.category||"") === state.categoryFilter);
  if (state.sibFilter !== "all") {
    const s = state.sibFilter;
    txs = txs.filter(t => {
      if (s === "Mamá") return t.type === "mother_expense" || t.paidBy === "Mamá" || t.from === "Mamá";
      return t.paidBy === s || t.recipient === s;
    });
  }

  const filterBar = renderFilterBar("historialFilter", "setHistorialFilter", true, true);
  if (state.loading) return filterBar + `<div class="empty" style="margin-top:24px;"><div class="spinner"></div></div>`;

  const displayTxs = (state.historialFilter === "all") ? txs.slice(0, 20) : txs;
  const hasMore = (state.historialFilter === "all") && txs.length > 20;
  if (!displayTxs.length) return filterBar + `<div class="empty" style="margin-top:24px;">Sin movimientos</div>`;

  const grouped = {};
  displayTxs.forEach(t => {
    const day = (t.date || t.timestamp || "").slice(0,10) || "?";
    if (!grouped[day]) grouped[day] = [];
    grouped[day].push(t);
  });
  const sortedDays = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  const myEmail = state.user?.email || "";

  // Build tx rows using DOM to avoid XSS
  const listDiv = document.createElement("div");
  listDiv.className = "tx-list";

  sortedDays.forEach(day => {
    const dayEl = document.createElement("div");
    dayEl.className = "tx-day";
    dayEl.textContent = formatDay(day);
    listDiv.appendChild(dayEl);

    grouped[day].forEach(t => {
      const canEdit = canEditTx(t);
      const wasEdited = t.updatedAt && String(t.updatedAt).length > 0;

      const item = document.createElement("div");
      item.className = "tx-item";

      // Icon
      const icon = document.createElement("div");
      icon.className = "tx-icon " + t.type;
      icon.textContent = txIcon(t);
      item.appendChild(icon);

      // Body
      const body = document.createElement("div");
      body.className = "tx-body";

      const descRow = document.createElement("div");
      descRow.className = "tx-desc";
      const descText = document.createElement("span");
      descText.textContent = t.description || typeLabel[t.type] || t.type;
      descRow.appendChild(descText);
      if (wasEdited) {
        const dot = document.createElement("span");
        dot.className = "tx-edited";
        dot.title = "Editado";
        descRow.appendChild(dot);
      }
      body.appendChild(descRow);

      const meta = document.createElement("div");
      meta.className = "tx-meta";
      const parts = [typeLabel[t.type] || t.type];
      if (t.paidBy) parts.push(t.paidBy);
      if (t.recipient) parts.push("→ " + t.recipient);
      if (t.category) parts.push(t.category);
      if (t.paymentMethod) parts.push(t.paymentMethod);
      if (!canEdit && t.loggedByEmail !== myEmail) parts.push("(" + (t.loggedBy || "?") + ")");
      meta.textContent = parts.join(" · ");
      body.appendChild(meta);
      item.appendChild(body);

      // Amount
      const amtEl = document.createElement("div");
      amtEl.className = "tx-amount " + t.type;
      amtEl.textContent = fmt(parseFloat(t.amount||0));
      item.appendChild(amtEl);

      // Action buttons
      const actions = document.createElement("div");
      actions.className = "tx-actions";

      // History button: only for owner or admin (avoids exposing backend ownership bug)
      if (canEdit) {
        const histBtn = document.createElement("button");
        histBtn.className = "tx-btn";
        histBtn.title = "Ver historial de cambios";
        histBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
        histBtn.addEventListener("click", () => showActivityLog(t.id));
        actions.appendChild(histBtn);
      }

      // Edit button
      const editBtn = document.createElement("button");
      editBtn.className = "tx-btn" + (canEdit ? "" : " disabled");
      editBtn.title = canEdit ? "Editar" : "Sin permiso";
      editBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
      if (canEdit) editBtn.addEventListener("click", () => editTransaction(t.id));
      actions.appendChild(editBtn);

      // Delete button
      const delBtn = document.createElement("button");
      delBtn.className = "tx-btn" + (canEdit ? "" : " disabled");
      delBtn.title = canEdit ? "Eliminar" : "Sin permiso";
      delBtn.textContent = "×";
      delBtn.style.fontSize = "1.1rem";
      if (canEdit) delBtn.addEventListener("click", () => deleteTransaction(t.id));
      actions.appendChild(delBtn);

      item.appendChild(actions);
      listDiv.appendChild(item);
    });
  });

  if (hasMore) {
    const more = document.createElement("div");
    more.style.cssText = "text-align:center;padding:16px;color:var(--muted);font-size:0.8rem;";
    more.textContent = "Mostrando los últimos 20 movimientos. Usá los filtros para ver más.";
    listDiv.appendChild(more);
  }

  // Return filterBar HTML + mount the DOM list after render
  const placeholder = `<div id="tx-list-mount"></div>`;
  requestAnimationFrame(() => {
    const mount = document.getElementById("tx-list-mount");
    if (mount) mount.replaceWith(listDiv);
  });
  return filterBar + placeholder;
}

// ════════════════════════════════════════════════════
// RESUMEN TAB
// ════════════════════════════════════════════════════
function renderResumen() {
  const filterBar = renderFilterBar("resumenFilter", "setResumenFilter");
  const txs    = filterTxs(state.transactions, state.resumenFilter);
  const allTxs = state.transactions;

  const { sib, mamaIngresos, mamaGastos, mamaBalance, totalIngresos, totalGastos } = computeBalances(txs);
  const allBal = sortedBalances(allTxs);
  const rt = computeBalances(allTxs);

  const totalTransfers = txs.filter(t=>t.type==="transfer").reduce((s,t)=>s+parseFloat(t.amount||0),0);
  const totalExpHermanos = txs.filter(t=>t.type==="expense").reduce((s,t)=>s+parseFloat(t.amount||0),0);

  const byCat = {};
  txs.filter(t=>t.type==="expense"||t.type==="mother_expense").forEach(t=>{
    const cat = t.category || "Otros";
    byCat[cat] = (byCat[cat]||0) + parseFloat(t.amount||0);
  });
  const catEntries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const catMax = Math.max(...Object.values(byCat),1);
  const totalAllExp = totalExpHermanos + txs.filter(t=>t.type==="mother_expense").reduce((s,t)=>s+parseFloat(t.amount||0),0);

  const bySibSpent = {};
  CONFIG.SIBLINGS.forEach(s=>bySibSpent[s]=0);
  txs.filter(t=>t.type==="expense").forEach(t=>{
    if (t.paidBy && bySibSpent[t.paidBy]!==undefined) bySibSpent[t.paidBy]+=parseFloat(t.amount||0);
  });
  const sibSpentMax = Math.max(...Object.values(bySibSpent),1);

  const aportesEntries = CONFIG.SIBLINGS
    .map(s=>({ name:s, val: sib[s]?.aportes||0 }))
    .filter(x=>x.val>0).sort((a,b)=>b.val-a.val);
  const aportesMax = Math.max(...aportesEntries.map(x=>x.val),1);

  const donut = buildDonut(catEntries, totalAllExp);

  const filterLabel = state.resumenFilter==="all" ? "acumulado total"
    : state.resumenFilter==="ytd" ? "año en curso"
    : state.resumenFilter.length===4 ? `año ${state.resumenFilter}`
    : formatMonth(state.resumenFilter);

  return `
    <div class="section" style="padding-top:14px;">
      <div class="section-label">Estado actual ${state.loading?`<div class='spinner' style='display:inline-block;width:12px;height:12px;border-width:2px;vertical-align:middle;'></div>`:""}</div>
      <div class="cards-row">
        <div class="card wide" style="background:rgba(196,181,253,0.06);border-color:rgba(196,181,253,0.2);">
          <div class="card-label">💰 Saldo total mamá</div>
          <div class="card-value ${rt.systemBalance>=0?"income":"expense"}" style="font-size:1.8rem;">${fmt(rt.systemBalance)}</div>
          <div style="font-size:0.72rem;color:var(--muted);margin-top:4px;">Todos los ingresos − todos los gastos</div>
        </div>
        <div class="card">
          <div class="card-label">🏦 Saldo cuenta mamá</div>
          <div class="card-value ${rt.mamaBalance>=0?"mother":"expense"}">${fmt(rt.mamaBalance)}</div>
          <div style="font-size:0.68rem;color:var(--muted);margin-top:4px;">En su cuenta bancaria</div>
        </div>
        <div class="card">
          <div class="card-label">👥 En manos hermanos</div>
          <div class="card-value income">${fmt(allBal.reduce((s,x)=>s+x.net,0))}</div>
          <div style="font-size:0.68rem;color:var(--muted);margin-top:4px;">Suma de saldos operativos</div>
        </div>
      </div>
    </div>

    ${filterBar}

    <div class="section" style="margin-top:12px;">
      <div class="section-label">Flujo — ${filterLabel}</div>
      <div class="cards-row">
        <div class="card"><div class="card-label">Total ingresos</div><div class="card-value income">${fmt(totalIngresos)}</div></div>
        <div class="card"><div class="card-label">Total transferido</div><div class="card-value mother">${fmt(totalTransfers)}</div></div>
        <div class="card"><div class="card-label">Total gastos</div><div class="card-value expense">${fmt(totalGastos)}</div></div>
        <div class="card"><div class="card-label">Gastos hermanos</div><div class="card-value expense">${fmt(totalExpHermanos)}</div></div>
        <div class="card"><div class="card-label">Saldo cuenta mamá</div><div class="card-value ${mamaBalance>=0?"mother":"expense"}">${fmt(mamaBalance)}</div></div>
        <div class="card"><div class="card-label">Balance hermanos</div><div class="card-value ${(totalTransfers-totalExpHermanos)>=0?"income":"expense"}">${fmt(totalTransfers-totalExpHermanos)}</div></div>
      </div>
    </div>

    ${catEntries.length ? `
    <div class="section" style="margin-top:16px;">
      <div class="section-label">Gastos por categoría</div>
      <div class="card wide">
        <div class="chart-wrap">
          ${donut}
          <div class="chart-legend">
            ${catEntries.map(([cat,amt],i)=>`
              <div class="legend-item">
                <div class="legend-dot" style="background:${CONFIG.CAT_COLORS[i%CONFIG.CAT_COLORS.length]}"></div>
                <span style="color:var(--muted)">${cat}</span>
                <span style="margin-left:auto;font-weight:600;">${Math.round(amt/totalAllExp*100)}%</span>
              </div>`).join("")}
          </div>
        </div>
        <div style="margin-top:12px;">
          ${catEntries.map(([cat,amt],i)=>`
            <div class="bar-row">
              <div class="bar-label">${cat}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/catMax*100)}%;background:${CONFIG.CAT_COLORS[i%CONFIG.CAT_COLORS.length]}"></div></div>
              <div class="bar-amount">${fmt(amt)}</div>
            </div>`).join("")}
        </div>
      </div>
    </div>` : ""}

    ${Object.values(bySibSpent).some(v=>v>0) ? `
    <div class="section" style="margin-top:16px;">
      <div class="section-label">Gastos por hermano</div>
      <div class="card wide">

// ── SVG donut chart ────────────────────────────────────────
function buildDonut(entries, total) {
  if (!total) return "";
  const r = 40, cx = 50, cy = 50, stroke = 14;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  const slices = entries.map(([cat,amt],i) => {
    const pct = amt / total;
    const dash = pct * circ;
    const gap  = circ - dash;
    const s = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
      stroke="${CONFIG.CAT_COLORS[i%CONFIG.CAT_COLORS.length]}"
      stroke-width="${stroke}"
      stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}"
      stroke-dashoffset="${(-offset * circ).toFixed(2)}"
      transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += pct;
    return s;
  }).join("");
  return `<svg viewBox="0 0 100 100" width="100" height="100" style="flex-shrink:0;">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="${stroke}"/>
    ${slices}
    <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle"
      style="fill:var(--text);font-size:9px;font-family:'DM Sans',sans-serif;">${fmt(total)}</text>
  </svg>`;
}

// ── Image compression ──────────────────────────────────────
function compressImage(file, maxPx=800, quality=0.6) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL("image/jpeg", quality).split(",")[1]);
    };
    img.src = url;
  });
}

window.sendAIPhoto = async (file) => {
  setState({ aiLoading: true, aiResult: null, aiText: "📷 Analizando foto del ticket..." });
  try {
    const base64 = await compressImage(file);
    const body = new URLSearchParams({ action: "parseImageWithAI", token: state.idToken, imageBase64: base64, mimeType: "image/jpeg" });
    const r = await fetch(CONFIG.APPS_SCRIPT_URL, { method: "POST", redirect: "follow", body });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    const parsed = d.data;
    if (parsed.type === "expense" || parsed.type === "mother_expense") {
      const cat = CONFIG.CATEGORIES.find(c => c.toLowerCase().includes((parsed.category||"").toLowerCase())) || CONFIG.CATEGORIES[0];
      setState({
        aiLoading: false, aiResult: parsed, aiText: "", tab: "gastos",
        expForm: { ...state.expForm, subtype: parsed.type || "expense", amount: parsed.amount ? String(parsed.amount) : "",
          description: parsed.description || "", category: cat, paidBy: parsed.paidBy || state.expForm.paidBy,
          paymentMethod: parsed.paymentMethod || "Cuenta", date: parsed.date || today() }
      });
    } else {
      setState({
        aiLoading: false, aiResult: parsed, aiText: "", tab: "ingresos",
        incForm: { ...state.incForm, subtype: parsed.type || "income", amount: parsed.amount ? String(parsed.amount) : "",
          description: parsed.description || "", source: parsed.source || state.incForm.source, date: parsed.date || today() }
      });
    }
  } catch(e) {
    setState({ aiLoading: false, aiText: "", aiResult: { interpretation: "No pude leer la foto. Intentá con mejor iluminación o completá manualmente.", confidence: "low" } });
  }
};

// ── Events ─────────────────────────────────────────────────
function attachEvents() {
  document.querySelectorAll("[data-tab]").forEach(btn =>
    btn.addEventListener("click", () => setState({ tab: btn.dataset.tab }))
  );
  document.querySelectorAll("[data-subtype][data-form='exp']").forEach(btn =>
    btn.addEventListener("click", () => setState({ expForm: { ...state.expForm, subtype: btn.dataset.subtype } }))
  );
  document.querySelectorAll("[data-subtype][data-form='inc']").forEach(btn =>
    btn.addEventListener("click", () => setState({ incForm: { ...state.incForm, subtype: btn.dataset.subtype } }))
  );

  const se = (id, cb) => { const el=document.getElementById(id); if(el) el.addEventListener("input",cb); };
  se("ef-date", e=>{
    state.expForm.date = e.target.value;
    const lbl = e.target.closest(".form-group")?.querySelector(".date-label");
    if(lbl) lbl.textContent = fmtDateDisplay(e.target.value);
  });
  se("ef-amount",   e=>{state.expForm.amount=e.target.value;});
  se("ef-cat",      e=>{state.expForm.category=e.target.value;});
  se("ef-desc",     e=>{state.expForm.description=e.target.value;});
  se("ef-paidby",   e=>{state.expForm.paidBy=e.target.value;});
  se("ef-payment",  e=>{state.expForm.paymentMethod=e.target.value;});
  se("if-date", e=>{
    state.incForm.date = e.target.value;
    const lbl = e.target.closest(".form-group")?.querySelector(".date-label");
    if(lbl) lbl.textContent = fmtDateDisplay(e.target.value);
  });
  se("if-amount",    e=>{state.incForm.amount=e.target.value;});
  se("if-from",      e=>{state.incForm.from=e.target.value;});
  se("if-source",    e=>{state.incForm.source=e.target.value;});
  se("if-recipient", e=>{state.incForm.recipient=e.target.value;});
  se("if-desc",      e=>{state.incForm.description=e.target.value;});
  se("ai-text",      e=>{state.aiText=e.target.value;});

  const photoInput = document.getElementById("ai-photo-input");
  if (photoInput) photoInput.addEventListener("change", e => {
    const file = e.target.files?.[0];
    if (file) {
      sendAIPhoto(file);
      e.target.value = "";  // reset so same file can be selected again
    }
  });
}
